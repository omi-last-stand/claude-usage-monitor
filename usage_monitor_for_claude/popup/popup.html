<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="popup.css">
</head>
<body>
<header>
    <span id="title"></span>
    <button type="button" id="closeBtn" aria-label="Close">&times;</button>
</header>

<section id="accountSection">
    <h2 id="headingAccount"></h2>
    <dl>
        <div id="emailRow">
            <dt id="labelEmail"></dt>
            <dd id="emailValue"></dd>
        </div>
        <div id="planRow">
            <dt id="labelPlan"></dt>
            <dd id="planValue"></dd>
        </div>
    </dl>
</section>

<section id="usageSection">
    <h2 id="headingUsage"></h2>
    <div id="usageBars"></div>
</section>

<section id="extraSection">
    <h2 id="headingExtraUsage"></h2>
    <div class="bar-header">
        <span id="extraSpent"></span>
        <span id="extraPct"></span>
    </div>
    <div class="bar-container">
        <div class="bar-fill" id="extraFill"></div>
    </div>
</section>

<section id="installSection">
    <div class="heading-row">
        <h2 id="headingClaudeCode"></h2>
        <span id="changelogLink"></span>
    </div>
    <dl id="installRows"></dl>
</section>

<footer id="statusSection">
    <span id="statusText"></span>
    <span id="appVersion"></span>
</footer>

<ul id="contextMenu" class="context-menu">
    <li id="menuAlwaysOnTop" class="menu-item"><span class="menu-check">&#10003;</span>常に前面に表示</li>
    <li id="menuSettings" class="menu-item">設定</li>
    <li id="menuAbout" class="menu-item">バージョン情報</li>
    <li class="menu-sep"></li>
    <li id="menuQuit" class="menu-item">終了</li>
</ul>

<script src="popup.js"></script>
</body>
</html>
