<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="settings.css">
</head>
<body>
<header>
    <h1 id="heading"></h1>
    <p class="hint" id="hint"></p>
</header>

<ul id="fieldList"></ul>
<p id="emptyHint" class="empty-hint" hidden></p>

<div class="language-row">
    <label id="languageLabel" for="languageSelect"></label>
    <select id="languageSelect"></select>
</div>
<p class="language-hint" id="languageHint"></p>

<footer>
    <button type="button" id="saveBtn"></button>
    <button type="button" id="cancelBtn"></button>
</footer>

<script src="settings.js"></script>
</body>
</html>
